name: CI — Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  TORCH_DEVICE: cpu

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_dataset.py \
            -k "not load_source_data"
        # Note: test_dataset tests that hit HuggingFace are skipped in CI
        # to avoid requiring HF_TOKEN. Run locally with HF_TOKEN set.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml
          retention-days: 14

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests ran on Python 3.11 / ubuntu-latest" >> $GITHUB_STEP_SUMMARY
