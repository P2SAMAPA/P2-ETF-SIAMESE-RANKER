hf:
  source_dataset: "P2SAMAPA/fi-etf-macro-signal-master-data"
  results_dataset: "P2SAMAPA/p2-etf-siamese-ranker-results"
  source_split: "train"

paths:
  data_dir: "data/"
  outputs_dir: "outputs/"
  models_dir: "outputs/models/"
  features_dir: "outputs/features/"
  rankings_dir: "outputs/rankings/"
  backtest_dir: "outputs/backtest/"

benchmarks:
  equity: "SPY"
  fi: "AGG"

training:
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10
  time_threshold_seconds: 600   # fallback to LightGBM if exceeded
  default_backend: "siamese"    # "siamese" or "lgbm"

holding_periods: [1, 3, 5]  # days; model picks best at inference

siamese:
  hidden_dims: [64, 32]
  head_dims: [32, 16]
  epochs: 20
  batch_size: 256
  learning_rate: 0.001
  dropout: 0.1

lgbm:
  n_estimators: 200
  num_leaves: 31
  learning_rate: 0.05
  objective: "lambdarank"
  metric: "ndcg"

backtest:
  shrinking_start_year: 2008
  shrinking_end_year: 2024  # last window starts 2024
  full_start_year: 2008
  consensus_weights:
    ann_return: 0.60
    sharpe: 0.20
    max_dd: 0.20  # negated before applying

cron:
  schedule: "0 22 * * 1-5"  # 22:00 Mon-Fri

macro_features:
  - VIX
  - DXY
  - T10Y2Y
  - TBILL_3M
  - IG_SPREAD
  - HY_SPREAD
