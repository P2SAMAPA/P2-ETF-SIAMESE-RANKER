module: "fi"
name: "FI / Commodities"

universe:
  - TLT
  - LQD
  - HYG
  - VNQ
  - GLD
  - SLV
  - VCIT

benchmark: "AGG"

# ETFs with late start dates — require special NaN handling
late_start_etfs:
  - VCIT   # starts ~2009

# Feature config
features:
  return_windows: [1, 5, 21]
  vol_windows: [5, 21]
  momentum_windows: [5, 21]
  use_macro: true
  macro_features:
    - VIX
    - DXY
    - T10Y2Y
    - TBILL_3M
    - IG_SPREAD
    - HY_SPREAD

# Training overrides (inherits from global if not set)
training:
  epochs: 20
  batch_size: 256
  early_stopping_patience: 5

# Output paths
output:
  ranking_file: "fi_module/output.json"
  model_path: "outputs/models/fi_siamese.pt"
  lgbm_model_path: "outputs/models/fi_lgbm.pkl"
  features_path: "outputs/features/fi_features.parquet"
  backtest_path: "outputs/backtest/fi_backtest.json"
