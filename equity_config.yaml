module: "equity"
name: "Equity Sectors"

universe:
  - QQQ
  - XLK
  - XLF
  - XLE
  - XLV
  - XLI
  - XLY
  - XLP
  - XLU
  - XME
  - GDX
  - IWM
  - IWF
  - XBI
  - XSD
  - XLB
  - XLRE

benchmark: "SPY"

# ETFs with late start dates — require special NaN handling
late_start_etfs:
  - XLRE   # starts ~2015

# Feature config
features:
  return_windows: [1, 5, 21]
  vol_windows: [5, 21]
  momentum_windows: [5, 21]
  use_macro: true
  macro_features:
    - VIX
    - DXY
    - T10Y2Y
    - TBILL_3M
    - IG_SPREAD
    - HY_SPREAD

# Training overrides
training:
  epochs: 20
  batch_size: 256
  early_stopping_patience: 5

# Output paths
output:
  ranking_file: "equity_module/output.json"
  model_path: "outputs/models/equity_siamese.pt"
  lgbm_model_path: "outputs/models/equity_lgbm.pkl"
  features_path: "outputs/features/equity_features.parquet"
  backtest_path: "outputs/backtest/equity_backtest.json"
